name: LibreOffice test
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  #schedule:
  #  - cron: "0 12 * * 4"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: build
      if: always()
      run: |
        sudo apt update && sudo apt install desktop-file-utils
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

        URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
        wget -c "$URL" -O appimagetool && chmod a+x ./appimagetool
        export PATH="$PWD":"${PATH}"
        
        chmod a+x ./make_libreoffice_appimage
        architecture="x86-64"
        languages="en-GB it ar zh-CN zh-TW fr de ja ko pt pt-BR es ru standard full"
        for a in still fresh; do
           for b in $languages; do
              mkdir -p "$a" && cp -r make_libreoffice_appimage "$a"/ && cd "$a" || exit 0
              ./make_libreoffice_appimage "$a" "architecture" "$b" N Y Y Y
              cd ..
           done
        done
        mkdir -p dist
        find . -type d -name out
        mv ./*/*/*AppImage* dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4.4.0
      with:
        name: AppImage
        path: 'dist'
        
  release:
      needs: [build]
      permissions: write-all
      runs-on: ubuntu-latest

      steps:
        - uses: actions/download-artifact@v4.1.8
          with:
            name: AppImage

        - name: release still
          uses: marvinpinto/action-automatic-releases@latest
          with:
            title: Continuous STILL
            automatic_release_tag: continuous-still
            prerelease: false
            draft: false
            files: |
              *still*.AppImage*
            repo_token: ${{ secrets.GITHUB_TOKEN }}

        - name: release fresh
          uses: marvinpinto/action-automatic-releases@latest
          with:
            title: Continuous FRESH
            automatic_release_tag: continuous-fresh
            prerelease: false
            draft: false
            files: |
              *fresh*.AppImage*
            repo_token: ${{ secrets.GITHUB_TOKEN }}
